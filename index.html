<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Kod — Canlı Yayın</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#f0f0f8;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem;text-align:center}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;background:linear-gradient(135deg,#c4b5fd,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{color:#6b7280;font-size:.9rem;max-width:260px;line-height:1.6}
#qr-box{background:#fff;border-radius:20px;padding:20px;display:inline-flex}
.url-badge{background:#111118;border:1px solid #1e1e2e;border-radius:8px;padding:.5rem 1rem;font-size:.75rem;color:#6b7280;font-family:monospace;word-break:break-all;max-width:300px}
</style>
</head>
<body>
<h1>📡 Canlı Yayın</h1>
<p>Bu kodu telefonunla okut, odaya gir.</p>
<div id="qr-box"></div>
<div class="url-badge" id="url-label">—</div>
<p style="font-size:.75rem">Biri yayındaysa izlersin · Kimse yoksa sen başlatırsın</p>
<script>
const base = location.origin + '/qr-live-stream.html?join=1';
document.getElementById('url-label').textContent = base;
new QRCode(document.getElementById('qr-box'), {
  text: base, width: 220, height: 220,
  colorDark: '#000', colorLight: '#fff',
  correctLevel: QRCode.CorrectLevel.M
});
</script>
</body>
</html>
