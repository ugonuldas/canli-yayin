<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ana Menü</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080e;--surface:#111118;--border:#1e1e2e;--accent:#6d28d9;--accent2:#1d4ed8;--text:#f0f0f8;--muted:#6b7280}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2rem;text-align:center}
h1{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:800;letter-spacing:-0.03em;line-height:1.1;background:linear-gradient(135deg,#c4b5fd 0%,#93c5fd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{color:var(--muted);font-size:.9rem;max-width:260px;line-height:1.6}
.cards{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:320px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:1.5rem 1.75rem;display:flex;align-items:center;gap:1.25rem;cursor:pointer;text-decoration:none;color:var(--text);transition:border-color .2s,transform .15s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.97)}
.card:hover{border-color:#6d28d9;box-shadow:0 0 24px #6d28d920}
.card-icon{font-size:2.2rem;flex-shrink:0}
.card-text{text-align:left}
.card-title{font-size:1.05rem;font-weight:700;margin-bottom:.2rem}
.card-desc{font-size:.8rem;color:var(--muted);line-height:1.5}
.logo-ring{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:0 0 32px #6d28d940}
</style>
</head>
<body>
<div class="logo-ring">✨</div>
<div>
  <h1>Hoş Geldin</h1>
  <p>Ne yapmak istiyorsun?</p>
</div>
<div class="cards">
  <a class="card" href="qr-live-stream.html">
    <div class="card-icon">📡</div>
    <div class="card-text">
      <div class="card-title">Canlı Yayın</div>
      <div class="card-desc">Yayın izle veya başlat</div>
    </div>
  </a>
  <a class="card" href="https://script.google.com/macros/s/AKfycbwWnJmohntEI9olKmeakbAfrjCwhszZwccFuSzYt1v-XmoBkOdK7xlAxHnTrhYqITrF/exec">
    <div class="card-icon">📷</div>
    <div class="card-text">
      <div class="card-title">Fotoğraf Yükle</div>
      <div class="card-desc">Anılarını paylaş</div>
    </div>
  </a>
</div>
</body>
</html>
