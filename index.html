<!DOCTYPE html>

<title>QR Kod — Canlı Yayın</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#f0f0f8;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem;text-align:center}

<h1>📡 Canlı Yayın</h1>

</html>
